services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${RELAY_POSTGRES_DB:-relay}
      POSTGRES_USER: ${RELAY_POSTGRES_USER:-relay}
      POSTGRES_PASSWORD: ${RELAY_POSTGRES_PASSWORD:?Set RELAY_POSTGRES_PASSWORD in your shell or .env file}
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

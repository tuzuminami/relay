openapi: 3.1.0
info:
  title: RELAY API
  version: 1.0.0
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    TenantId:
      name: X-Tenant-Id
      in: header
      required: true
      schema:
        type: string
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
  schemas:
    Meta:
      type: object
      required: [requestId, correlationId, apiVersion]
      properties:
        requestId:
          type: string
        correlationId:
          type: string
        apiVersion:
          type: string
          const: v1
    RouteResolutionEnvelope:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [allowed, reasonCodes]
          properties:
            allowed:
              type: boolean
            reasonCodes:
              type: array
              items:
                type: string
            route:
              type: object
              properties:
                routeId:
                  type: string
                providerId:
                  type: string
                model:
                  type: string
                requiredCapabilities:
                  type: array
                  items:
                    type: string
                maxCostCents:
                  type: integer
            provider:
              type: object
              properties:
                providerId:
                  type: string
                adapterType:
                  type: string
                  enum: [openai-compatible]
                capabilities:
                  type: array
                  items:
                    type: string
        meta:
          $ref: "#/components/schemas/Meta"
    ProviderValidationEnvelope:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [valid, reasonCodes, providerId, capabilities]
          properties:
            valid:
              type: boolean
            reasonCodes:
              type: array
              items:
                type: string
            providerId:
              type: string
            capabilities:
              type: array
              items:
                type: string
        meta:
          $ref: "#/components/schemas/Meta"
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, details, correlationId]
          properties:
            code:
              type: string
              enum:
                - AUTHENTICATION_REQUIRED
                - TENANT_SCOPE_DENIED
                - VALIDATION_FAILED
                - IDEMPOTENCY_CONFLICT
                - IDEMPOTENCY_IN_PROGRESS
                - IDEMPOTENCY_FAILED
                - CONFIGURATION_INVALID
                - DEPENDENCY_UNAVAILABLE
                - POLICY_BLOCKED
            message:
              type: string
            details:
              type: array
              items:
                type: string
            correlationId:
              type: string
paths:
  /health:
    get:
      responses:
        "200":
          description: Service health.
  /ready:
    get:
      responses:
        "200":
          description: Service readiness.
  /v1/routes/resolve:
    get:
      security:
        - bearerAuth: []
      description: Route resolution is a dry-run and never calls a provider.
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/CorrelationId"
        - name: purpose
          in: query
          required: true
          schema:
            type: string
        - name: dataClassification
          in: query
          required: true
          schema:
            enum: [public, internal, confidential, restricted]
        - name: capability
          in: query
          required: true
          schema:
            enum: [chat, stream, embeddings, tools, json_mode, vision]
        - name: maxCostCents
          in: query
          required: true
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: A compliant route was found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteResolutionEnvelope"
        "403":
          description: No compliant route is available; response remains a dry-run route resolution envelope with allowed=false.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteResolutionEnvelope"
  /v1/chat/completions:
    post:
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/CorrelationId"
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
        - name: X-VEIL-Enforcement
          in: header
          required: true
          description: >-
            A short-lived EdDSA JWS issued by VEIL for this exact model_call.
            RELAY verifies issuer, audience, tenant, action, request hash, expiry,
            and one-time decision use before provider I/O.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ./schemas/chat-completion-request.schema.json
      responses:
        "200":
          description: Normalized chat completion response.
        "401":
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: >-
            Tenant or route policy denied the request, or VEIL enforcement was
            missing, invalid, expired, mismatched, or replayed. Error codes are
            VEIL_DECISION_REQUIRED, VEIL_DECISION_INVALID, and VEIL_DECISION_REPLAYED.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422":
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Idempotency-Key conflict, in-progress request, or failed prior attempt.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                conflict:
                  value:
                    error:
                      code: IDEMPOTENCY_CONFLICT
                      message: Idempotency key was already used with a different request.
                      details: []
                      correlationId: corr_demo
                inProgress:
                  value:
                    error:
                      code: IDEMPOTENCY_IN_PROGRESS
                      message: Idempotency key is already processing this request.
                      details: []
                      correlationId: corr_demo
                failed:
                  value:
                    error:
                      code: IDEMPOTENCY_FAILED
                      message: Idempotency key is associated with a failed prior attempt.
                      details: []
                      correlationId: corr_demo
        "503":
          description: Provider or runtime dependency failed safely without exposing secrets.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /v1/usage:
    get:
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Usage records for the authenticated tenant.
        "401":
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Tenant scope denied.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /v1/providers/validate:
    post:
      description: >-
        Validates provider configuration without contacting the provider. In
        production, baseUrl must be HTTPS and match the configured exact origin
        allowlist; loopback, private, link-local, metadata, numeric, and IPv6
        host forms are rejected.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ./schemas/provider-validation-request.schema.json
      responses:
        "200":
          description: Provider configuration is valid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderValidationEnvelope"
        "401":
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Tenant scope denied.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "422":
          description: Provider configuration is invalid, or the request body is malformed.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ProviderValidationEnvelope"
                  - $ref: "#/components/schemas/ErrorEnvelope"
